<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreamcore Тест Связи</title>
    <style>
        body { font-family: monospace; background: #1a1a1a; color: #00ff00; padding: 20px; }
        #chatBox { height: 250px; border: 1px solid #00ff00; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #000; }
        .controls { display: flex; gap: 10px; }
        input { flex: 1; padding: 5px; background: #222; color: #00ff00; border: 1px solid #00ff00; }
        button { padding: 5px 15px; background: #00ff00; color: #000; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Проверка моста: GitHub ➡️ Google</h2>
    <div id="chatBox">Загрузка сообщений из Гугл-Таблицы...</div>

    <div class="controls">
        <input type="text" id="messageInput" placeholder="Напишите что-нибудь...">
        <button onclick="sendMessage()">Отправить в Облако</button>
    </div>

    <script>
        // ВСТАВЬТЕ СЮДА СВОЮ ССЫЛКУ ИЗ ГУГЛ СКРИПТА МЕЖДУ КАВЫЧКАМИ:
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwRrKt2MhGuSH3mjLHXf2LXFoieUyQdylNCXfywOumTkyILg0i3-4EzrEQStBFizNEp/exec';

        // Отправка
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            try {
                // Гугл Скрипты капризные, поэтому отправляем запрос через text/plain, но внутри пишем JSON
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Важно для работы с Google Apps Script без ошибок CORS
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                
                input.value = '';
                // Так как режим 'no-cors' не дает прочитать ответ, просто ждем секунду и обновляем чат
                setTimeout(loadMessages, 1500);
            } catch (error) {
                console.error("Ошибка:", error);
            }
        }

        // Загрузка
        async function loadMessages() {
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL);
                const data = await response.json();
                
                const chatBox = document.getElementById('chatBox');
                chatBox.innerHTML = '';
                
                if(data.messages && data.messages.length > 0) {
                    data.messages.forEach(msg => {
                        const div = document.createElement('div');
                        div.style.marginBottom = '5px';
                        div.innerText = '• ' + msg;
                        chatBox.appendChild(div);
                    });
                } else {
                    chatBox.innerText = 'В таблице пока пусто...';
                }
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (error) {
                console.error("Не удалось загрузить:", error);
            }
        }

        // Обновляем раз в 5 секунд, чтобы не спамить Гугл слишком часто
        setInterval(loadMessages, 5000);
        loadMessages();
    </script>
</body>
</html>
